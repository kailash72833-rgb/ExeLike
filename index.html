<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Like Panel | Pro Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* New Animated Premium Background */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Upgraded Glassmorphism Effect */
        .glass-panel {
            background: rgba(25, 25, 35, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .glass-panel:hover {
            transform: translateY(-5px);
        }

        h2 {
            margin-top: 0;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #00ff88, #00b3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0 20px 0;
            box-sizing: border-box;
            border: none;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
            outline: none;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        
        input::placeholder { color: rgba(255,255,255,0.4); font-weight: 400; }
        input:focus { 
            border-color: #00ff88; 
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        /* Improved Button with Glow */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
        }

        button:hover { 
            box-shadow: 0 6px 20px rgba(255, 75, 43, 0.6);
            transform: translateY(-2px);
        }
        button:active { transform: translateY(1px); }
        button:disabled { 
            background: #444; 
            box-shadow: none;
            color: #888;
            cursor: not-allowed; 
            transform: none;
        }

        /* Modal / Pop-up Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.1);
            transform: scale(0.9);
            animation: popUp 0.3s ease forwards;
        }

        @keyframes popUp { to { transform: scale(1); } }

        .success-title { color: #00ff88; font-size: 24px; margin-bottom: 20px; font-weight: 800; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .fail-title { color: #ff4b2b; font-size: 20px; margin-bottom: 20px; font-weight: 800; line-height: 1.6; }
        
        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            font-size: 15px;
            border-left: 3px solid #00b3ff;
        }

        .data-label { color: #aaa; font-weight: 600; font-size: 14px;}
        .data-value { font-weight: 800; color: #fff; }

        #main-section { display: none; }
        
        /* New Loading Animation & Status Text */
        .loader-container {
            display: none;
            margin-top: 20px;
        }

        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        .loading-text {
            margin-top: 15px;
            font-size: 13px;
            color: #00ff88;
            font-weight: 600;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .close-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            margin-top: 25px;
            box-shadow: none;
        }
        .close-btn:hover { background: rgba(255,255,255,0.1); border-color: white; }
    </style>
</head>
<body>

    <div class="glass-panel" id="login-section">
        <h2>Security Check</h2>
        <input type="password" id="access-key" placeholder="Enter Access Key" onkeypress="handleLoginEnter(event)">
        <button onclick="checkKey()">Verify & Login</button>
    </div>

    <div class="glass-panel" id="main-section">
        <h2>Like Injector</h2>
        <input type="number" id="uid-input" placeholder="Enter Target UID" onkeypress="handleSendEnter(event)">
        <button id="send-btn" onclick="sendLike()">Inject Likes</button>
        
        <div class="loader-container" id="loader-container">
            <div class="loader"></div>
            <div class="loading-text">INJECTING LIKES... PLEASE WAIT!</div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content" id="modal-body">
            </div>
    </div>

    <script>
        // Trigger login on Enter key
        function handleLoginEnter(e) {
            if (e.key === 'Enter') checkKey();
        }

        // Trigger send on Enter key
        function handleSendEnter(e) {
            if (e.key === 'Enter') sendLike();
        }

        function checkKey() {
            const key = document.getElementById('access-key').value;
            if(key === 'EXE OWNER') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-section').style.display = 'block';
            } else {
                alert('🚫 Galat Access Key! Sahi key dalo.');
            }
        }

        async function sendLike() {
            const uid = document.getElementById('uid-input').value;
            if(!uid) return alert('⚠️ Bhai UID to daal le!');
            if(isNaN(uid)) return alert('⚠️ UID sirf numbers mein hoti hai!');

            const btn = document.getElementById('send-btn');
            const loader = document.getElementById('loader-container');
            
            // Disable button & show loader
            btn.disabled = true;
            btn.innerText = "Processing...";
            loader.style.display = 'block';

            // AbortController to handle extended timeouts (120 seconds setup)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 120000); // 120s timeout

            try {
                // Fetching data with custom timeout signal
                const response = await fetch(`/api/like?uid=${uid}`, { signal: controller.signal });
                clearTimeout(timeoutId); // Clear timeout if successful
                
                const data = await response.json();
                showModal(data);
            } catch (err) {
                if (err.name === 'AbortError') {
                    alert('⏳ Request Timeout: Like bhejte hue 2 minute se jyada lag gaye. (Check Backend limits)');
                } else {
                    alert('🔌 Server connect nahi ho raha ya API error aaya!');
                }
            } finally {
                // Re-enable button & hide loader
                btn.disabled = false;
                btn.innerText = "Inject Likes";
                loader.style.display = 'none';
            }
        }

        function showModal(data) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modal-body');
            
            // Check if likes actually increased (or status is 1)
            if (data.status === 1 && data.LikesGivenByAPI > 0) {
                modalBody.innerHTML = `
                    <div class="success-title">INJECTION SUCCESSFUL</div>
                    <div class="data-row"><span class="data-label">NAME</span> <span class="data-value">${data.PlayerNickname || '-'}</span></div>
                    <div class="data-row"><span class="data-label">UID</span> <span class="data-value">${data.UID || '-'}</span></div>
                    <div class="data-row"><span class="data-label">REGION</span> <span class="data-value">IND</span></div>
                    <div class="data-row"><span class="data-label">OLD LIKES</span> <span class="data-value">${data.LikesbeforeCommand || 0}</span></div>
                    <div class="data-row"><span class="data-label">NEW LIKES</span> <span class="data-value">${data.LikesafterCommand || 0}</span></div>
                    <div class="data-row" style="border-left-color: #00ff88;"><span class="data-label">LIKES INJECTED</span> <span class="data-value" style="color:#00ff88">+${data.LikesGivenByAPI || 0}</span></div>
                    <button class="close-btn" onclick="closeModal()">CLOSE PANEL</button>
                `;
            } else {
                const name = data.PlayerNickname || 'Bhai';
                modalBody.innerHTML = `
                    <div class="fail-title">PAHLE AAINE ME FACE DEKHO <br><span style="color:#fff; font-size: 26px; text-transform: uppercase; display: inline-block; margin-top: 10px;">${name}</span><br> FIR LIKE LENE AANA 😂</div>
                    <button class="close-btn" onclick="closeModal()">CLOSE</button>
                `;
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
