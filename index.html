

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Like Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphism Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(#fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            box-sizing: border-box;
            border: none;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
            outline: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        input::placeholder { color: rgba(255,255,255,0.5); }
        input:focus { border-color: rgba(255,255,255,0.8); }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #555; cursor: not-allowed; }

        /* Modal / Pop-up Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .success-title { color: #00ff88; font-size: 26px; margin-bottom: 20px; font-weight: 800; }
        .fail-title { color: #ff4b2b; font-size: 22px; margin-bottom: 20px; font-weight: 800; line-height: 1.5; }
        
        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 16px;
        }

        .data-label { color: #aaa; font-weight: 600;}
        .data-value { font-weight: 800; color: #fff; }

        #main-section { display: none; }
        
        /* Loading Animation */
        .loader {
            display: none;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #ff4b2b;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 20px auto 0;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .close-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="glass-panel" id="login-section">
        <h2>Authentication</h2>
        <input type="password" id="access-key" placeholder="ENTER ACCESS KEY">
        <button onclick="checkKey()">LOGIN</button>
    </div>

    <div class="glass-panel" id="main-section">
        <h2>Like Panel</h2>
        <input type="number" id="uid-input" placeholder="ENTER UID HERE">
        <button id="send-btn" onclick="sendLike()">SEND LIKE</button>
        <div class="loader" id="loader"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content" id="modal-body">
            </div>
    </div>

    <script>
        function checkKey() {
            const key = document.getElementById('access-key').value;
            if(key === 'EXE OWNER') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-section').style.display = 'block';
            } else {
                alert('Galat Access Key! Sahi key dalo.');
            }
        }

        async function sendLike() {
            const uid = document.getElementById('uid-input').value;
            if(!uid) return alert('Bhai UID to daal le!');

            const btn = document.getElementById('send-btn');
            const loader = document.getElementById('loader');
            
            // Disable button & show loader
            btn.disabled = true;
            loader.style.display = 'block';

            try {
                // Call Python Backend which handles the actual API with 60s timeout
                const response = await fetch(`/api/like?uid=${uid}`);
                const data = await response.json();
                showModal(data);
            } catch (err) {
                alert('Server connect nahi ho raha ya 60s Timeout ho gaya!');
            } finally {
                // Re-enable button & hide loader
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function showModal(data) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modal-body');
            
            // Check if likes actually increased (or status is 1)
            if (data.status === 1 && data.LikesGivenByAPI > 0) {
                modalBody.innerHTML = `
                    <div class="success-title">LIKE ADDED SUCCESSFULLY</div>
                    <div class="data-row"><span class="data-label">NAME</span> <span class="data-value">${data.PlayerNickname || '-'}</span></div>
                    <div class="data-row"><span class="data-label">UID</span> <span class="data-value">${data.UID || '-'}</span></div>
                    <div class="data-row"><span class="data-label">REGION</span> <span class="data-value">IND</span></div>
                    <div class="data-row"><span class="data-label">BEFORE LIKES</span> <span class="data-value">${data.LikesbeforeCommand || 0}</span></div>
                    <div class="data-row"><span class="data-label">AFTER LIKES</span> <span class="data-value">${data.LikesafterCommand || 0}</span></div>
                    <div class="data-row"><span class="data-label">LIKES ADDED</span> <span class="data-value" style="color:#00ff88">${data.LikesGivenByAPI || 0}</span></div>
                    <button class="close-btn" onclick="closeModal()">CLOSE</button>
                `;
            } else {
                const name = data.PlayerNickname || 'Bhai';
                modalBody.innerHTML = `
                    <div class="fail-title">PAHLE AAINE ME FACE DEKHO <br><span style="color:#fff; font-size: 28px; text-transform: uppercase;">${name}</span><br> FIR LIKE LENE AANA 😂</div>
                    <button class="close-btn" onclick="closeModal()">CLOSE</button>
                `;
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
